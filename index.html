<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Login</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-box {
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    position: relative;
}

.login-box h2 {
    margin-bottom: 20px;
    color: #333;
}

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.login-box button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: none;
    border-radius: 6px;
    background-color: #6a11cb;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}

.login-box button:hover {
    background-color: #2575fc;
}

/* Success message (hidden by default) */
.success-message {
    display: none;
    margin-top: 15px;
    color: green;
    font-weight: bold;
}

/* Show message when URL hash is #success */
#success:target {
    display: block;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <!-- Using action="#success" to trigger the message -->
    <form action="#success">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p id="success" class="success-message">Login Successful!</p>
</div>

</body>
</html>
